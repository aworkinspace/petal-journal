      cocoa_lilac: {"--bg":"#141014","--surface":"#1A141B","--surface-2":"#261C28","--border":"rgba(255,255,255,.14)","--primary":"#E2B3FF","--primary-soft":"rgba(226,179,255,.35)","--accent":"#FFB38A","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},

    };

    const name = localStorage.getItem("petal_theme") || "petal";

    if (name === "custom") {
      try {
        const raw = localStorage.getItem("petal_custom_theme_vars");
        if (raw) {
          const vars = JSON.parse(raw);
          for (const k in vars) document.documentElement.style.setProperty(k, vars[k]);
        }
      } catch {}
      return;
    }

    const t = THEMES[name] || THEMES.petal;
    for (const k in t) document.documentElement.style.setProperty(k, t[k]);
  })();

    <style>

  <body>
    <header>
      <div class="brand">
        <h1>Petal Journal</h1>
        <small class="muted">your profile</small>
      </div>
      <div class="top-actions">
        <a class="btn" href="index.html">Back to Journal</a>
      </div>
    </header>

    <div class="profile-wrap">
      <main class="panel panel-pad profile-card">
        <h2 style="margin: 0 0 24px">Your Profile</h2>

        <div class="profile-pic-container">
          <img id="profilePic" class="profile-pic" src="assets/default-profile.png" alt="Profile Picture" />
          <div class="profile-pic-upload">
            <input type="file" id="picUpload" accept="image/*" hidden />
            <button class="btn" id="btnUploadPic" type="button">Upload New Picture</button>
            <small class="muted" id="picUploadMsg"></small>
          </div>
        </div>

        <div class="profile-field">
          <div class="section-title">Email</div>
          <p id="userEmail" class="muted" style="margin: 0"></p>
        </div>

        <div class="profile-field">
          <div class="section-title">Display Name</div>
          <input class="input" id="displayName" type="text" placeholder="Your Display Name" />
          <small class="muted" id="nameUpdateMsg" style="margin-top: 8px; display:block;"></small>
        </div>

        <div class="profile-field">
          <div class="section-title">Birthday</div>
          <input class="input" id="userBirthday" type="date" />
          <small class="muted" id="birthdayUpdateMsg" style="margin-top: 8px; display:block;"></small>
        </div>
<div class="profile-field">
  <div class="section-title">Custom Theme (beta, JSON)</div>
  <input id="themeUpload" type="file" accept="application/json" />
  <button class="btn" id="btnClearTheme" type="button">Remove custom theme</button>
  <small class="muted" id="themeMsg" style="display:block; margin-top:8px;"></small>
</div>

        <div class="row" style="margin-top: 24px">
          <button class="btn btn-primary" id="btnUpdateProfile" type="button">Save Profile</button>
          <small class="muted" id="generalMsg"></small>
        </div>

        <div class="divider" style="margin: 24px 0"></div>

        <div class="row">
          <button class="btn btn-accent" id="btnDeleteAccount" type="button">Delete Account</button>
          <small class="muted" id="deleteAccountMsg"></small>
        </div>
      </main>
    </div>

    <script type="module">
      import { onAuthStateChanged, updateProfile, deleteUser } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
      import { doc, getDoc, setDoc, enableNetwork } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
      import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";

      const auth = window.firebaseAuth;
      const db = window.firebaseDb;
      const storage = window.firebaseStorage;

      enableNetwork(db).catch(() => {});

      const $ = (id) => document.getElementById(id);
      const profilePicEl = $("profilePic");
      const userEmailEl = $("userEmail");
      const displayNameEl = $("displayName");
      const userBirthdayEl = $("userBirthday");
      const btnUploadPic = $("btnUploadPic");
      const picUploadEl = $("picUpload");
      const picUploadMsgEl = $("picUploadMsg");
      const nameUpdateMsgEl = $("nameUpdateMsg");
      const birthdayUpdateMsgEl = $("birthdayUpdateMsg");
      const generalMsgEl = $("generalMsg");
      const btnUpdateProfile = $("btnUpdateProfile");
      const btnDeleteAccount = $("btnDeleteAccount");

      const DEFAULT_PIC = "assets/default-profile.png";
      let currentUser = null;

      function showMsg(el, msg, isError = false) {
        if (!el) return;
        el.textContent = msg;
        el.style.color = isError ? "var(--accent)" : "var(--text-muted)";
      }

      function cacheBust(url) {
        if (!url) return url;
        const u = new URL(url, location.href);
        u.searchParams.set("v", String(Date.now()));
        return u.toString();
      }

      async function loadProfile(user) {
        userEmailEl.textContent = user.email || "";
        displayNameEl.value = user.displayName || "";
        profilePicEl.src = user.photoURL ? cacheBust(user.photoURL) : DEFAULT_PIC;

        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          if (userDoc.exists()) {
            const data = userDoc.data();
            userBirthdayEl.value = data.birthday || "";
          }
        } catch (error) {
          console.error("loadProfile Firestore error:", error);
          showMsg(
            generalMsgEl,
            "Can’t reach the server right now (offline / blocked). Try disabling adblock/VPN and refresh.",
            true
          );
        }
      }

      // Upload picture
      btnUploadPic?.addEventListener("click", () => picUploadEl?.click());

      picUploadEl?.addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        if (!currentUser) {
          showMsg(picUploadMsgEl, "You must be logged in to upload a picture.", true);
          return;
        }

        if (!file.type.startsWith("image/")) {
          showMsg(picUploadMsgEl, "Please choose an image file.", true);
          picUploadEl.value = "";
          return;
        }

        if (file.size > 3 * 1024 * 1024) {
          showMsg(picUploadMsgEl, "Image too large (max 3MB).", true);
          picUploadEl.value = "";
          return;
        }

        showMsg(picUploadMsgEl, "Uploading picture...", false);

        try {
          // unique filename avoids cached/stale downloads
          const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
          const path = `profile_pictures/${currentUser.uid}/profile_${Date.now()}.${ext}`;

          const storageRef = ref(storage, path);
          await uploadBytes(storageRef, file);

          const photoURL = await getDownloadURL(storageRef);
          await updateProfile(currentUser, { photoURL });

          profilePicEl.src = cacheBust(photoURL);
          showMsg(picUploadMsgEl, "Profile picture updated!");
        } catch (error) {
          console.error("Error uploading picture:", error);
          showMsg(picUploadMsgEl, `Failed to upload: ${error.message}`, true);
        } finally {
          picUploadEl.value = "";
        }
      });

      // Save profile
      btnUpdateProfile?.addEventListener("click", async () => {
        if (!currentUser) {
          showMsg(generalMsgEl, "You must be logged in to update your profile.", true);
          return;
        }

        showMsg(generalMsgEl, "Saving profile...", false);

        try {
          const nextName = displayNameEl.value.trim();
          if (nextName !== (currentUser.displayName || "")) {
            await updateProfile(currentUser, { displayName: nextName });
            showMsg(nameUpdateMsgEl, "Display name updated!");
          } else {
            showMsg(nameUpdateMsgEl, "");
          }

          if (!navigator.onLine) {
            showMsg(generalMsgEl, "You appear offline. Connect to the internet and try again.", true);
            return;
          }

          await setDoc(doc(db, "users", currentUser.uid), { birthday: userBirthdayEl.value || "" }, { merge: true });

          showMsg(birthdayUpdateMsgEl, "Birthday updated!");
          showMsg(generalMsgEl, "Profile saved successfully!");
        } catch (error) {
          console.error("Error updating profile:", error);
          console.log("SAVE ERROR CODE:", error.code);
          showMsg(generalMsgEl, `Failed to save profile: ${error.message}`, true);
        }
      });

      // Delete account
      btnDeleteAccount?.addEventListener("click", async () => {
        if (!currentUser) {
          showMsg(generalMsgEl, "You must be logged in to delete your account.", true);
          return;
        }

        if (!confirm("Are you sure you want to delete your account? This action is irreversible.")) return;

        showMsg(generalMsgEl, "Deleting account...", false);

        try {
          await deleteUser(currentUser);
          showMsg(generalMsgEl, "Account deleted. Redirecting...", false);
          localStorage.removeItem("petal_early_access");
          setTimeout(() => (location.href = "login.html"), 1500);
        } catch (error) {
          console.error("Error deleting account:", error);
          if (error.code === "auth/requires-recent-login") {
            showMsg(generalMsgEl, "Please log in again recently to delete your account for security.", true);
          } else {
            showMsg(generalMsgEl, `Failed to delete account: ${error.message}`, true);
          }
        }
      });

      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUser = user;
          loadProfile(user);
        } else {
          alert("You must be logged in to view your profile.");
          location.href = "login.html";
        }
      });
import { doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
const themeUploadEl = document.getElementById("themeUpload");
const btnClearTheme = document.getElementById("btnClearTheme");
const themeMsgEl = document.getElementById("themeMsg");

function isValidVarName(k){ return typeof k === "string" && k.startsWith("--") && k.length <= 64; }
function isValidVarVal(v){ return typeof v === "string" && v.length <= 200; }

themeUploadEl?.addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file || !currentUser) return;

  try {
    const text = await file.text();
    const json = JSON.parse(text);

    const name = String(json?.name || "Custom Theme").slice(0, 40);
    const vars = json?.vars && typeof json.vars === "object" ? json.vars : null;
    if (!vars) throw new Error("Invalid file: missing vars object.");

    // sanitize
    const cleaned = {};
    for (const [k, v] of Object.entries(vars)) {
      if (!isValidVarName(k) || !isValidVarVal(v)) continue;
      cleaned[k] = v;
    }
    if (Object.keys(cleaned).length === 0) throw new Error("No valid CSS variables found.");

    await setDoc(doc(db, "users", currentUser.uid, "settings", "theme"), {
      enabled: true,
      name,
      vars: cleaned,
      updatedAt: Date.now(),
    }, { merge: true });

    themeMsgEl.textContent = `Saved: ${name}`;
  } catch (err) {
    themeMsgEl.textContent = `Theme upload failed: ${err.message || err}`;
  } finally {
    e.target.value = "";
  }
});

btnClearTheme?.addEventListener("click", async () => {
  if (!currentUser) return;
  await deleteDoc(doc(db, "users", currentUser.uid, "settings", "theme"));
  themeMsgEl.textContent = "Custom theme removed.";
});
    </script>
