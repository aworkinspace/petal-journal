<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Petal Journal — Account</title>
    <link rel="stylesheet" href="style.css" />
<script>
  (function () {
    const THEMES = {
      petal: {"--bg":"var(--rose-50)","--surface":"var(--rose-50)","--surface-2":"var(--pink-200)","--border":"var(--mauve-200)","--primary":"var(--periwinkle-400)","--primary-soft":"var(--periwinkle-200)","--accent":"var(--pink-500)","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      lavender: {"--bg":"#F6F2FF","--surface":"#F6F2FF","--surface-2":"#EDE4FF","--border":"#D8CBF2","--primary":"#A7ABDE","--primary-soft":"#CED1F8","--accent":"#D7A6FF","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      sky_sorbet: {"--bg":"#F2FBFF","--surface":"#F2FBFF","--surface-2":"#DFF3FF","--border":"#C7E4F5","--primary":"#7DB6FF","--primary-soft":"#CFE4FF","--accent":"#FFA5D6","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      peach_milk: {"--bg":"#FFF6F0","--surface":"#FFF6F0","--surface-2":"#FFE3D2","--border":"#F2CDBB","--primary":"#A7ABDE","--primary-soft":"#CED1F8","--accent":"#FFB38A","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      lemon_cream: {"--bg":"#FFFCEB","--surface":"#FFFCEB","--surface-2":"#FFF2B8","--border":"#E9DFA2","--primary":"#9AB6FF","--primary-soft":"#D6E3FF","--accent":"#FFC857","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      dusky_rose: {"--bg":"#141016","--surface":"#19131C","--surface-2":"#241A26","--border":"rgba(255,255,255,.14)","--primary":"#B7A6FF","--primary-soft":"rgba(183,166,255,.35)","--accent":"#FF8FBC","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      mauve_night: {"--bg":"#100F14","--surface":"#15131A","--surface-2":"#201B25","--border":"rgba(255,255,255,.14)","--primary":"#9FB6FF","--primary-soft":"rgba(159,182,255,.35)","--accent":"#D7A6FF","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      deep_sage: {"--bg":"#0F1412","--surface":"#141A17","--surface-2":"#1C2621","--border":"rgba(255,255,255,.14)","--primary":"#93D1B3","--primary-soft":"rgba(147,209,179,.35)","--accent":"#FF9BB7","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      blueberry_dusk: {"--bg":"#0D101A","--surface":"#12172A","--surface-2":"#1A2140","--border":"rgba(255,255,255,.14)","--primary":"#8EA2FF","--primary-soft":"rgba(142,162,255,.35)","--accent":"#8FE3FF","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      cocoa_lilac: {"--bg":"#141014","--surface":"#1A141B","--surface-2":"#261C28","--border":"rgba(255,255,255,.14)","--primary":"#E2B3FF","--primary-soft":"rgba(226,179,255,.35)","--accent":"#FFB38A","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      midnight: {"--bg":"#0F0D14","--surface":"#14121A","--surface-2":"#1C1824","--border":"rgba(255,255,255,.14)","--primary":"#8EA2FF","--primary-soft":"rgba(142,162,255,.35)","--accent":"#FFA5D6","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"}
    };

    const themeName = localStorage.getItem("petal_theme") || "petal";
    const theme = THEMES[themeName] || THEMES.petal;
    const root = document.documentElement;
    for (const k in theme) root.style.setProperty(k, theme[k]);
  })();
</script>
    <style>
      .login-wrap {
        max-width: 520px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .login-card {
        padding: 18px;
      }
      .login-card .row {
        justify-content: flex-start;
        gap: 12px;
        flex-wrap: wrap;
      }
    </style>

    <!-- Firebase SDKs - IMPORTANT: Make sure this matches index.html Firebase setup -->
    <script type="module">
      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
      // Firestore and Storage aren't strictly needed on the login page, but keeping consistent
      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
      import { getStorage } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";

      // Your web app's Firebase configuration - PASTE HERE FROM CONSOLE
      const firebaseConfig = {
  apiKey: "AIzaSyBqpOzgqcRebD_yCtjW7HqIyy9rdTcCVvc",
  authDomain: "petal-journal-app.firebaseapp.com",
  databaseURL: "https://petal-journal-app-default-rtdb.firebaseio.com",
  projectId: "petal-journal-app",
  storageBucket: "petal-journal-app.firebasestorage.app",
  messagingSenderId: "162872929125",
  appId: "1:162872929125:web:89587cde0bfdd26fc94f8c"
};

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);

      // Export Firebase services globally for use in this script
      window.firebaseAuth = getAuth(app);
      window.firebaseDb = getFirestore(app);
      window.firebaseStorage = getStorage(app);
    </script>
    <!-- End Firebase SDKs -->
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>Petal Journal</h1>
        <small class="muted">account access</small>
      </div>
      <div class="top-actions">
        <a class="btn" href="index.html">Back to Journal</a>
      </div>
    </header>

    <div class="login-wrap">
      <main class="panel panel-pad login-card">
        <h2 style="margin: 0 0 8px">Login / Sign Up</h2>
        <p class="muted" style="margin: 0 0 14px">
          Access early features by creating an account.
        </p>

        <div class="section-title">Email</div>
        <input class="input" id="email" type="email" autocomplete="username" placeholder="email@example.com" />

        <div class="section-title" style="margin-top: 12px">Password</div>
        <input class="input" id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

        <div class="row" style="margin-top: 18px; justify-content: space-between">
          <div class="chip-row">
            <button class="btn btn-primary" id="btnLogin" type="button">Login</button>
            <button class="btn" id="btnSignUp" type="button">Sign Up</button>
          </div>
          <small class="muted" id="authMsg"></small>
        </div>

        <div class="divider"></div>

        <button class="btn btn-primary" id="btnResetPassword" type="button">Forgot Password?</button>
      </main>
    </div>

    <script type="module">
      import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

      const auth = window.firebaseAuth; // Get auth instance from global scope

      const $ = (id) => document.getElementById(id);
      const emailEl = $("email");
      const passwordEl = $("password");
      const authMsgEl = $("authMsg");
      const btnLogin = $("btnLogin");
      const btnSignUp = $("btnSignUp");
      const btnResetPassword = $("btnResetPassword");

      // Check if user is already logged in
      onAuthStateChanged(auth, (user) => {
        if (user) {
          authMsgEl.textContent = `Logged in as ${user.email}. Redirecting...`;
          // Set early access flag (Firebase user implies early access)
          localStorage.setItem("petal_early_access", "1");
          setTimeout(() => (location.href = "index.html"), 1500);
        } else {
          // If not logged in, ensure early access flag is off
          localStorage.removeItem("petal_early_access");
        }
      });

      btnLogin.addEventListener("click", async () => {
        const email = emailEl.value;
        const password = passwordEl.value;
        if (!email || !password) {
          authMsgEl.textContent = "Please enter email and password.";
          return;
        }
        authMsgEl.textContent = "Logging in...";
        try {
          await signInWithEmailAndPassword(auth, email, password);
          authMsgEl.textContent = "Login successful! Redirecting...";
          localStorage.setItem("petal_early_access", "1");
          setTimeout(() => (location.href = "index.html"), 1500);
        } catch (error) {
          console.error("Login failed:", error.code, error.message);
          authMsgEl.textContent = `Login failed: ${error.message}`;
        }
      });

      btnSignUp.addEventListener("click", async () => {
        const email = emailEl.value;
        const password = passwordEl.value;
        if (!email || !password) {
          authMsgEl.textContent = "Please enter email and password.";
          return;
        }
        authMsgEl.textContent = "Signing up...";
        try {
          await createUserWithEmailAndPassword(auth, email, password);
          authMsgEl.textContent = "Sign up successful! Redirecting...";
          localStorage.setItem("petal_early_access", "1");
          setTimeout(() => (location.href = "index.html"), 1500);
        } catch (error) {
          console.error("Sign up failed:", error.code, error.message);
          authMsgEl.textContent = `Sign up failed: ${error.message}`;
        }
      });

      btnResetPassword.addEventListener("click", async () => {
        const email = emailEl.value;
        if (!email) {
          authMsgEl.textContent = "Please enter your email to reset password.";
          return;
        }
        authMsgEl.textContent = "Sending reset email...";
        try {
          await sendPasswordResetEmail(auth, email);
          authMsgEl.textContent = "Password reset email sent (check spam folder!).";
        } catch (error) {
          console.error("Password reset failed:", error.code, error.message);
          authMsgEl.textContent = `Password reset failed: ${error.message}`;
        }
      });
    </script>
  </body>
</html>
