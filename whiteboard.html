<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <title>Petal Journal — Whiteboard</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .wb-wrap{ max-width:1200px; margin:0 auto; padding:12px 24px 28px; }
      .wb-tools{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:12px; }
      #wb{ width:100%; height:70vh; display:block; border-radius:16px; }
      .wb-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      input[type="range"]{ width:140px; }
    </style>
  </head>

  <body>
    <header>
      <div class="brand">
        <h1>Whiteboard</h1>
        <small class="muted">draw and doodle</small>
      </div>
      <div class="top-actions">
        <a class="btn" href="index.html">Back</a>
      </div>
    </header>

    <div class="wb-wrap">
      <div class="panel wb-tools">
        <div class="wb-row">
          <span class="muted">Color</span>
          <input id="color" type="color" value="#A7ABDE" />
        </div>

        <div class="wb-row">
          <span class="muted">Size</span>
          <input id="size" type="range" min="1" max="30" value="6" />
        </div>

        <div class="wb-row">
          <button class="btn" id="eraser" type="button">Eraser</button>
          <button class="btn" id="pen" type="button">Pen</button>
          <button class="btn" id="clear" type="button">Clear</button>
          <button class="btn btn-primary" id="save" type="button">Download PNG</button>
        </div>

        <small class="muted">Tip: use mouse or touch.</small>
      </div>

      <div class="panel" style="padding:12px; margin-top:14px;">
        <canvas id="wb"></canvas>
      </div>
    </div>
<div class="music" style="justify-content:center; flex-wrap:wrap; margin: 0 24px 18px;">
  <button class="btn" id="btnMusic" type="button">Play Music</button>
  <input id="musicVol" type="range" min="0" max="1" step="0.01" value="0.35" aria-label="Music volume" />
  <audio id="bgm" src="assets/lofi.mp3" loop preload="auto"></audio>
</div>
<script>
  (function () {
    const themes = {
      petal: {
        "--pink-500": "#FFA5D6",
        "--pink-200": "#FFD6EE",
        "--rose-50": "#FFF0F1",
        "--mauve-200": "#ECD2E0",
        "--periwinkle-200": "#CED1F8",
        "--periwinkle-400": "#A7ABDE",
        "--text": "#2B2B33",
        "--text-muted": "#5A5A6A",
      },
      lavender: {
        "--pink-500": "#FFB6E1",
        "--pink-200": "#F5D9FF",
        "--rose-50": "#FFF7FB",
        "--mauve-200": "#E8D7EF",
        "--periwinkle-200": "#D7DEFF",
        "--periwinkle-400": "#9AA6FF",
        "--text": "#2B2B33",
        "--text-muted": "#5A5A6A",
      },
      midnight: {
        "--pink-500": "#FFA5D6",
        "--pink-200": "#2A2233",
        "--rose-50": "#14121A",
        "--mauve-200": "#3A3247",
        "--periwinkle-200": "#2E2A45",
        "--periwinkle-400": "#A7ABDE",
        "--text": "#F2F0F7",
        "--text-muted": "#C9C5D6",
      },
      strawberry_matcha: {
        "--pink-500": "#FF9FC6",
        "--pink-200": "#FFD6EA",
        "--rose-50": "#FFF5F9",
        "--mauve-200": "#DDF2E2",
        "--periwinkle-200": "#BFE5C9",
        "--periwinkle-400": "#7FCF9A",
        "--text": "#2B2B33",
        "--text-muted": "#5A5A6A",
      },
      blueberry_yogurt: {
        "--pink-500": "#AEB7FF",
        "--pink-200": "#DFE2FF",
        "--rose-50": "#FFF7FB",
        "--mauve-200": "#F2D6E8",
        "--periwinkle-200": "#E6C0DB",
        "--periwinkle-400": "#B58AB7",
        "--text": "#2B2B33",
        "--text-muted": "#5A5A6A",
      },
      sky_sorbet: {
        "--pink-500": "#FFB8D8",
        "--pink-200": "#FFE0F0",
        "--rose-50": "#FFF7FB",
        "--mauve-200": "#D7E6FF",
        "--periwinkle-200": "#B7D1FF",
        "--periwinkle-400": "#7FA6FF",
        "--text": "#2B2B33",
        "--text-muted": "#5A5A6A",
      },
      peach_milk: {
        "--pink-500": "#FFB08A",
        "--pink-200": "#FFE1D3",
        "--rose-50": "#FFF7F0",
        "--mauve-200": "#F2D3DA",
        "--periwinkle-200": "#E8C2CF",
        "--periwinkle-400": "#C99BB2",
        "--text": "#2B2B33",
        "--text-muted": "#5A5A6A",
      },
      lemon_cream: {
        "--pink-500": "#FFE48A",
        "--pink-200": "#FFF3C8",
        "--rose-50": "#FFFCF0",
        "--mauve-200": "#E7D9FF",
        "--periwinkle-200": "#D3C1FF",
        "--periwinkle-400": "#A997FF",
        "--text": "#2B2B33",
        "--text-muted": "#5A5A6A",
      },
    };

    const name = localStorage.getItem("petal_theme") || "petal";
    const t = themes[name] || themes.petal;
    for (const [k, v] of Object.entries(t)) {
      document.documentElement.style.setProperty(k, v);
    }
  })();
</script>
<script>
  const canvas = document.getElementById("wb");
  const ctx = canvas.getContext("2d");

  const colorEl = document.getElementById("color");
  const sizeEl = document.getElementById("size");
  const penBtn = document.getElementById("pen");
  const eraserBtn = document.getElementById("eraser");
  const clearBtn = document.getElementById("clear");
  const saveBtn = document.getElementById("save");

  let drawing = false;
  let last = null;
  let mode = "pen";

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const rect = canvas.getBoundingClientRect();
    const prev = canvas.toDataURL("image/png");

    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, rect.width, rect.height);

    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
    img.src = prev;
  }

  function pos(e) {
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }

  function stroke(a, b) {
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = Number(sizeEl.value);

    if (mode === "eraser") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.strokeStyle = "rgba(0,0,0,1)";
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = colorEl.value;
    }

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  function down(e) { drawing = true; last = pos(e); }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = pos(e);
    stroke(last, p);
    last = p;
  }
  function up() { drawing = false; last = null; }

  penBtn.addEventListener("click", () => (mode = "pen"));
  eraserBtn.addEventListener("click", () => (mode = "eraser"));

  clearBtn.addEventListener("click", () => {
    const rect = canvas.getBoundingClientRect();
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, rect.width, rect.height);
  });

  saveBtn.addEventListener("click", () => {
    const a = document.createElement("a");
    a.download = "whiteboard.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });

  canvas.addEventListener("mousedown", down);
  canvas.addEventListener("mousemove", move);
  window.addEventListener("mouseup", up);

  canvas.addEventListener("touchstart", down, { passive: true });
  canvas.addEventListener("touchmove", move, { passive: false });
  window.addEventListener("touchend", up);

  canvas.style.width = "100%";
  canvas.style.height = "70vh";
  resize();
  window.addEventListener("resize", resize);

  // --- Background music controls ---
  (() => {
    const audio = document.getElementById("bgm");
    const btn = document.getElementById("btnMusic");
    const vol = document.getElementById("musicVol");
    if (!audio || !btn || !vol) return;

    const savedVol = localStorage.getItem("petal_music_vol");
    if (savedVol !== null) vol.value = savedVol;
    audio.volume = Number(vol.value);

    function setBtn() {
      btn.textContent = audio.paused ? "Play music" : "Pause music";
    }
    setBtn();

    vol.addEventListener("input", () => {
      audio.volume = Number(vol.value);
      localStorage.setItem("petal_music_vol", String(vol.value));
    });

    btn.addEventListener("click", async () => {
      try {
        audio.muted = false;
        if (audio.paused) await audio.play();
        else audio.pause();
        setBtn();
      } catch (e) {
        console.warn(e);
        btn.textContent = "Tap again";
      }
    });
  })();
</script>
  </body>
</html>
