<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <title>Petal Journal — Whiteboard</title>
    <link rel="stylesheet" href="style.css" />
<script>
  (function () {
    const THEMES = {
      petal: {"--bg":"var(--rose-50)","--surface":"var(--rose-50)","--surface-2":"var(--pink-200)","--border":"var(--mauve-200)","--primary":"var(--periwinkle-400)","--primary-soft":"var(--periwinkle-200)","--accent":"var(--pink-500)","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      lavender: {"--bg":"#F6F2FF","--surface":"#F6F2FF","--surface-2":"#EDE4FF","--border":"#D8CBF2","--primary":"#A7ABDE","--primary-soft":"#CED1F8","--accent":"#D7A6FF","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      sky_sorbet: {"--bg":"#F2FBFF","--surface":"#F2FBFF","--surface-2":"#DFF3FF","--border":"#C7E4F5","--primary":"#7DB6FF","--primary-soft":"#CFE4FF","--accent":"#FFA5D6","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      peach_milk: {"--bg":"#FFF6F0","--surface":"#FFF6F0","--surface-2":"#FFE3D2","--border":"#F2CDBB","--primary":"#A7ABDE","--primary-soft":"#CED1F8","--accent":"#FFB38A","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      lemon_cream: {"--bg":"#FFFCEB","--surface":"#FFFCEB","--surface-2":"#FFF2B8","--border":"#E9DFA2","--primary":"#9AB6FF","--primary-soft":"#D6E3FF","--accent":"#FFC857","--text":"#2B2B33","--text-muted":"#5A5A6A"},
      dusky_rose: {"--bg":"#141016","--surface":"#19131C","--surface-2":"#241A26","--border":"rgba(255,255,255,.14)","--primary":"#B7A6FF","--primary-soft":"rgba(183,166,255,.35)","--accent":"#FF8FBC","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      mauve_night: {"--bg":"#100F14","--surface":"#15131A","--surface-2":"#201B25","--border":"rgba(255,255,255,.14)","--primary":"#9FB6FF","--primary-soft":"rgba(159,182,255,.35)","--accent":"#D7A6FF","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      deep_sage: {"--bg":"#0F1412","--surface":"#141A17","--surface-2":"#1C2621","--border":"rgba(255,255,255,.14)","--primary":"#93D1B3","--primary-soft":"rgba(147,209,179,.35)","--accent":"#FF9BB7","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      blueberry_dusk: {"--bg":"#0D101A","--surface":"#12172A","--surface-2":"#1A2140","--border":"rgba(255,255,255,.14)","--primary":"#8EA2FF","--primary-soft":"rgba(142,162,255,.35)","--accent":"#8FE3FF","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      cocoa_lilac: {"--bg":"#141014","--surface":"#1A141B","--surface-2":"#261C28","--border":"rgba(255,255,255,.14)","--primary":"#E2B3FF","--primary-soft":"rgba(226,179,255,.35)","--accent":"#FFB38A","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"},
      midnight: {"--bg":"#0F0D14","--surface":"#14121A","--surface-2":"#1C1824","--border":"rgba(255,255,255,.14)","--primary":"#8EA2FF","--primary-soft":"rgba(142,162,255,.35)","--accent":"#FFA5D6","--text":"#F2F0F7","--text-muted":"rgba(242,240,247,.75)","--bg-spot-1":"transparent","--bg-spot-2":"transparent"}
    };

    const themeName = localStorage.getItem("petal_theme") || "petal";
    const theme = THEMES[themeName] || THEMES.petal;
    const root = document.documentElement;
    for (const k in theme) root.style.setProperty(k, theme[k]);
  })();
</script>
    <style>
      .wb-wrap{ max-width:1200px; margin:0 auto; padding:12px 24px 28px; }
      .wb-tools{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; padding:12px; }
      #wb{ width:100%; height:70vh; display:block; border-radius:16px; background: #fff; }
      .wb-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      input[type="range"]{ width:140px; }
#wb{
  pointer-events: auto !important;
}
    </style>
  </head>

  <body>
    <header>
      <div class="brand">
        <h1>Whiteboard</h1>
        <small class="muted">draw and doodle</small>
      </div>
      <div class="top-actions">
        <a class="btn" href="index.html">Back</a>
      </div>
    </header>

    <div class="wb-wrap">
      <div class="panel wb-tools">
        <div class="wb-row">
          <span class="muted">Color</span>
          <input id="color" type="color" value="#A7ABDE" />
        </div>

        <div class="wb-row">
          <span class="muted">Size</span>
          <input id="size" type="range" min="1" max="30" value="6" />
        </div>

        <div class="wb-row">
          <span class="muted">Pen</span>
          <select id="penStyle" class="input">
            <option value="smooth">Smooth</option>
            <option value="marker">Marker</option>
            <option value="highlighter">Highlighter</option>
            <option value="spray">Spray</option>
            <option value="watercolor">Watercolor</option>
          </select>
        </div>

        <div class="wb-row">
          <button class="btn" id="eraser" type="button">Eraser</button>
          <button class="btn" id="pen" type="button">Pen</button>
          <button class="btn" id="clear" type="button">Clear</button>
          <button class="btn btn-primary" id="save" type="button">Download PNG</button>
        </div>

        <small class="muted">Tip: use mouse or touch.</small>
      </div>

      <div class="panel" style="padding:12px; margin-top:14px;">
        <canvas id="wb"></canvas>
      </div>
    </div>

    <div class="music" style="justify-content:center; flex-wrap:wrap; margin: 0 24px 18px;">
      <button class="btn" id="btnMusic" type="button">Play Music</button>
      <button class="btn" id="btnNextTrack" type="button">Next</button>
      <input id="musicVol" type="range" min="0" max="1" step="0.01" value="0.35" aria-label="Music volume" />
      <audio id="bgm" src="assets/lofi.mp3" loop preload="auto"></audio>
    </div>
<audio id="clearSfx" src="assets/clear-sfx.mp3" preload="auto"></audio>
          <script>
      const canvas = document.getElementById("wb");
      const ctx = canvas.getContext("2d");

      const colorEl = document.getElementById("color");
      const sizeEl = document.getElementById("size");
      const penBtn = document.getElementById("pen");
      const eraserBtn = document.getElementById("eraser");
      const clearBtn = document.getElementById("clear");
      const saveBtn = document.getElementById("save");
      const penStyleEl = document.getElementById("penStyle");

      let drawing = false;
      let last = null;
      let mode = "pen";
      let penStyle = "smooth";

      penStyleEl?.addEventListener("change", () => (penStyle = penStyleEl.value));
      penBtn.addEventListener("click", () => (mode = "pen"));
      eraserBtn.addEventListener("click", () => (mode = "eraser"));

      function resize() {
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        const rect = canvas.getBoundingClientRect();
        const prev = canvas.toDataURL("image/png");

        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);

        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = prev;
      }

      function pos(e) {
        const rect = canvas.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        return { x: p.clientX - rect.left, y: p.clientY - rect.top };
      }

      function stroke(a, b) {
        const size = Number(sizeEl.value);

        // eraser
        if (mode === "eraser") {
  ctx.globalCompositeOperation = "source-over";
  ctx.globalAlpha = 1;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.lineWidth = size;
  ctx.strokeStyle = "#ffffff";
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
  return;
}

        // pen modes
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = colorEl.value;

        if (penStyle === "marker") {
          ctx.globalAlpha = 0.9;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.lineWidth = size * 1.6;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
          ctx.globalAlpha = 1;
          return;
        }

        if (penStyle === "highlighter") {
          ctx.globalAlpha = 0.25;
          ctx.lineCap = "butt";
          ctx.lineJoin = "round";
          ctx.lineWidth = size * 2.4;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
          ctx.globalAlpha = 1;
          return;
        }

        if (penStyle === "spray") {
          ctx.globalAlpha = 0.35;
          const density = 14;
          for (let i = 0; i < density; i++) {
            const ang = Math.random() * Math.PI * 2;
            const rad = Math.random() * size * 1.6;
            const x = b.x + Math.cos(ang) * rad;
            const y = b.y + Math.sin(ang) * rad;
            ctx.beginPath();
            ctx.arc(x, y, Math.max(1, size * 0.12), 0, Math.PI * 2);
            ctx.fillStyle = colorEl.value;
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          return;
        }
        if (penStyle === "watercolor") {
          // soft layered dabs + slight jitter = watercolor feel
          ctx.globalCompositeOperation = "source-over";
          ctx.lineCap = "round";
          ctx.lineJoin = "round";

          const base = size * 1.8;
          const steps = 6;

          for (let i = 0; i < steps; i++) {
            const t = (i + 1) / steps;
            const x = a.x + (b.x - a.x) * t;
            const y = a.y + (b.y - a.y) * t;

            const jx = (Math.random() - 0.5) * size * 0.6;
            const jy = (Math.random() - 0.5) * size * 0.6;

            ctx.globalAlpha = 0.08 + Math.random() * 0.06; // very translucent
            ctx.fillStyle = colorEl.value;

            // main wash
            ctx.beginPath();
            ctx.arc(x + jx, y + jy, base * (0.55 + Math.random() * 0.35), 0, Math.PI * 2);
            ctx.fill();

            // darker core
            ctx.globalAlpha = 0.05 + Math.random() * 0.05;
            ctx.beginPath();
            ctx.arc(x + jx * 0.5, y + jy * 0.5, base * 0.35, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.globalAlpha = 1;
          return;
        }

        // smooth (default)
        ctx.globalAlpha = 1;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = size;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      function down(e) {
        drawing = true;
        last = pos(e);
      }
      function move(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = pos(e);
        stroke(last, p);
        last = p;
      }
      function up() {
        drawing = false;
        last = null;
      }

      clearBtn.addEventListener("click", () => {
  const rect = canvas.getBoundingClientRect();
  ctx.globalCompositeOperation = "source-over";
  ctx.globalAlpha = 1; // Ensure alpha is reset for clear
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, rect.width, rect.height);

  // Play the sound effect
  const sfx = document.getElementById("clearSfx");
  if (sfx) {
    sfx.pause();
    sfx.currentTime = 0;
    sfx.play().catch(() => {});
  }
});

      saveBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.download = "whiteboard.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      });

      canvas.addEventListener("mousedown", down);
      canvas.addEventListener("mousemove", move);
      window.addEventListener("mouseup", up);

      canvas.addEventListener("touchstart", down, { passive: true });
      canvas.addEventListener("touchmove", move, { passive: false });
      window.addEventListener("touchend", up);

      canvas.style.width = "100%";
      canvas.style.height = "70vh";
      resize();
      window.addEventListener("resize", resize);

      // --- Background music controls ---
      (() => {
  const audio = document.getElementById("bgm");
  const btn = document.getElementById("btnMusic");
  const btnNext = document.getElementById("btnNextTrack"); // add this button in whiteboard.html
  const vol = document.getElementById("musicVol");
  if (!audio || !btn || !vol) return;

  const tracks = [
  "assets/lofi.mp3",
  "assets/elevator.mp3",
  "assets/monty.mp3",
  "assets/intro.mp3"
];

  let i = Number(localStorage.getItem("petal_track_index") || "0");
  if (!Number.isFinite(i) || i < 0) i = 0;
  i %= tracks.length;

  const savedVol = localStorage.getItem("petal_music_vol");
  if (savedVol !== null) vol.value = savedVol;
  audio.volume = Number(vol.value || 0.35);

  function setBtn() {
    btn.textContent = audio.paused ? "Play music" : "Pause music";
  }

  function setTrack(nextIndex, autoplay = false) {
    i = ((nextIndex % tracks.length) + tracks.length) % tracks.length;
    localStorage.setItem("petal_track_index", String(i));

    const wasPlaying = !audio.paused;
    audio.src = tracks[i];
    audio.loop = false; // allow next / ended
    audio.load();

    if (autoplay || wasPlaying) audio.play().catch(() => {});
    setBtn();
  }

  // initial load
  setTrack(i, false);

  vol.addEventListener("input", () => {
    audio.volume = Number(vol.value);
    localStorage.setItem("petal_music_vol", String(vol.value));
  });

  btn.addEventListener("click", async () => {
    try {
      audio.muted = false;
      if (audio.paused) await audio.play();
      else audio.pause();
      setBtn();
    } catch (e) {
      console.warn(e);
      btn.textContent = "Tap again";
    }
  });

  btnNext?.addEventListener("click", () => setTrack(i + 1, true));
  audio.addEventListener("ended", () => setTrack(i + 1, true));

  setBtn();
})();
    </script>
  </body>
</html>
